<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衛武營歌劇院-貴賓座位管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 基礎樣式 --- */
        *{box-sizing:border-box}
        html,body{margin:0;padding:0;height:100%;font-family:sans-serif;background:#e9ecef}
        body{overflow:hidden}
        .app{ display:grid; grid-template-columns:440px minmax(0,1fr); width:100vw; height:100vh; }
        #sidebar{ background:#fff; border-right:1px solid #cfcfcf; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:20px; }
        #sidebar h1{ margin:0; font-size:22px; font-weight:800; color:#000; line-height:1.4; }
        .session-tabs{ display:flex; gap:10px; }
        .tab-btn{ flex:1; padding:12px; border:1px solid #cfcfcf; background:#f6f6f6; cursor:pointer; font-weight:700; border-radius:4px; }
        .tab-btn.active{ background:#2f4358; color:#fff; border-color:#2f4358; }
        .input-group{ display:flex; flex-direction:column; gap:8px; background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #eee; }
        .input-group input{ width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; }
        .btn-confirm{ background:#28a745; color:white; border:none; padding:12px; font-weight:700; cursor:pointer; border-radius:4px; }
        .guest-list-container{ flex:1; display:flex; flex-direction:column; min-height:0; }
        .guest-list{ overflow-y:auto; border:1px solid #eee; border-radius:4px; flex:1; }
        .guest-item{ padding:12px; border-bottom:1px solid #eee; cursor:pointer; transition:0.2s; display:flex; justify-content:space-between; align-items:center; }
        .guest-item:hover{ background:#f0f7ff; }
        .guest-item.selected{ background:#e3f2fd; border-left:5px solid #2196f3; }
        .guest-item.completed{ background:#f0f0f0; color:#888; cursor:default; }
        .guest-info { flex: 1; }
        .guest-name{ font-weight:700; display:block; }
        .guest-note { font-size: 12px; color: #666; display: block; margin-top: 2px; }
        .btn-delete { color: #dc3545; font-weight: 800; padding: 5px 10px; cursor: pointer; border: 1px solid transparent; border-radius: 4px; }
        .btn-delete:hover { background: #fff0f0; border-color: #fab1a0; }

        /* --- 座位圖佈局 --- */
        #main-content{ overflow:auto; padding:40px 28px 80px; background:#e9ecef; }
        .canvas{ display:flex; flex-direction:column; align-items:center; width:max-content; margin:0 auto; background:#e9ecef; }
        .stage{ width:625px; height:50px; background:#2f4358; color:#fff; text-align:center; line-height:50px; margin-bottom:60px; border-radius:0 0 42px 42px; font-size:20px; font-weight:800; }
        .floor1-shell{ position:relative; width:max-content; margin:0 auto; }
        .rows{ display:flex; flex-direction:column; align-items:center; width:max-content; }
        .row{ display:flex; align-items:center; margin-bottom:12px; width:max-content; }
        .label{ width:54px; text-align:right; margin-right:18px; font-size:18px; font-weight:800; color:#000; flex-shrink:0; }
        .seat-row{ display:flex; align-items:center; width:max-content; }
        .side{ display:flex; align-items:center; }
        .cluster{ display:flex; align-items:center; }
        .gap{ width:44px; flex:0 0 44px; }
        .seat{
            width:54px; height:54px; margin:0 3px; border:1px solid #b7b7b7; background:#fff;
            display:flex; align-items:center; justify-content:center; font-size:11px; border-radius:4px;
            cursor:pointer; text-align:center; line-height:1.1; overflow:hidden; word-break:break-all;
        }
        .seat.occupied{ font-weight:700; color:#000; }
        .seat.has-border{ border-width:3px !important; }
        .seat.wheelchair{ background:#e8f5e9; border:2px solid #4caf50; font-weight:700; }
        .seat.blocked { background: #000 !important; border-color: #000 !important; color: #000 !important; cursor: default !important; pointer-events: none; }
        .floor2-shell{ margin-top:90px; display:grid; grid-template-columns:auto auto auto; column-gap:24px; align-items:start; width:max-content; }
        .floor2-main{ display:flex; flex-direction:column; align-items:center; width:max-content; }
        .rear-shell{ margin-top:90px; display:grid; grid-template-columns:auto auto auto; column-gap:24px; align-items:start; width:max-content; }
        .center-space{ width:520px; min-height:10px; }
        .floor-title { font-size: 24px; font-weight: 800; margin: 30px 0 15px; color: #555; border-bottom: 2px solid #ccc; width: 100%; text-align: center; }
        .subtitle-box{ position:absolute; width:64px; background:#d9dde2; border:1px solid #aeb6bf; display:flex; align-items:center; justify-content:center; writing-mode:vertical-rl; color:#4b5563; font-size:14px; z-index:2; }
        .front-box-layer{ position:absolute; inset:0; pointer-events:none; z-index:3; }
        .front-box-row{ position:absolute; display:flex; align-items:center; width:max-content; pointer-events:auto; }

        @media print {
            @page { size: A3 landscape; margin: 0; }
            body { background: #e9ecef !important; overflow: visible !important; height: auto !important; }
            #sidebar { display: none !important; }
            .app { display: block !important; }
        }
    </style>
</head>
<body class="mode-overview">
<div class="app">
    <aside id="sidebar">
        <h1>衛武營歌劇院<br>管理系統</h1>
        <div class="session-tabs">
            <button class="tab-btn active" onclick="switchSession('afternoon')">下午場</button>
            <button class="tab-btn" onclick="switchSession('evening')">晚上場</button>
        </div>
        <div class="input-group">
            <input type="text" id="inName" placeholder="貴賓姓名">
            <input type="number" id="inCount" placeholder="張數" min="1">
            <input type="text" id="inNote" placeholder="備註 (僅顯示於待排區)">
            <button class="btn-confirm" onclick="addGuest()">確認新增</button>
        </div>
        <div class="guest-list-container">
            <div id="guest-list" class="guest-list"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn-confirm" style="background:#dc3545" onclick="clearData()">清空重來</button>
            <button class="btn-confirm" style="background:#6c757d" onclick="window.print()">列印本頁</button>
        </div>
    </aside>

    <main id="main-content">
        <div class="canvas" id="main-canvas">
            <div class="stage">舞台 STAGE</div>
            <div id="floor1-shell" class="floor1-shell">
                <div id="left-subtitle" class="subtitle-box">L排字幕工作區</div>
                <div id="right-subtitle" class="subtitle-box">R排字幕工作區</div>
                <div id="front-box-layer" class="front-box-layer"></div>
                <div id="floor1-rows" class="rows"></div>
            </div>
            <div class="floor2-shell">
                <div id="floor2-left-front" class="floor2-side"></div>
                <div id="floor2-main" class="floor2-main"></div>
                <div id="floor2-right-front" class="floor2-side"></div>
            </div>
            <div class="rear-shell">
                <div id="rear-left" class="rear-side"></div>
                <div class="center-space"></div>
                <div id="rear-right" class="rear-side"></div>
            </div>
            <div id="f34-container">
                <div class="floor-title">3F (三樓樓座)</div>
                <div id="floor3-rows" class="rows"></div>
                <div class="floor-title">4F (四樓樓座)</div>
                <div id="floor4-rows" class="rows"></div>
            </div>
        </div>
    </main>
</div>

<script>
// --- 初始化與數據 ---
const SUPABASE_URL = 'https://dzaxlashywosrphjcinq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kwMa__ULhpQ3uR07A_d-7g_XApJls_V';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const SAVE_KEY = "WeiWuYing_Seating_v3";

let currentSession = 'afternoon';
const sessions = { afternoon: { guests: [], seatMap: {} }, evening: { guests: [], seatMap: {} } };
let selectedGuestId = null;
const colors = ["#FFADAD","#FFD6A5","#FDFFB6","#CAFFBF","#9BF6FF","#A0C4FF","#BDB2FF","#FFC6FF"];
let colorMap = {};

// 1F RR 修正為 20 座
const floor1Rows = [{row:"P1",total:26},{row:"P2",total:28},{row:"P3",total:28},{row:"P4",total:28},{row:"AA",total:30},{row:"BB",total:30},{row:"CC",total:32},{row:"DD",total:32},{row:"EE",total:32},{row:"FF",total:34},{row:"GG",total:38},{row:"HH",total:38},{row:"II",total:36},{row:"JJ",total:36},{row:"KK",total:34},{row:"LL",total:34},{row:"MM",total:32},{row:"NN",total:32},{row:"OO",total:32},{row:"PP",total:30},{row:"QQ",total:28},{row:"RR",total:20}];

// --- 核心功能 ---
async function loadData() {
    const { data } = await supabaseClient.from('seating_data').select('config').eq('id', 1).single();
    if (data?.config?.sessions) {
        Object.assign(sessions, data.config.sessions);
        Object.assign(colorMap, data.config.colorMap || {});
        render();
    }
}

async function saveData() {
    await supabaseClient.from('seating_data').update({ config: { sessions, colorMap } }).eq('id', 1);
}

function switchSession(s) {
    currentSession = s; selectedGuestId = null;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('onclick').includes(s)));
    render();
}

function addGuest() {
    const name = document.getElementById('inName').value.trim();
    const count = parseInt(document.getElementById('inCount').value);
    const note = document.getElementById('inNote').value.trim();
    if (!name || isNaN(count)) return;
    const id = "g-" + Date.now();
    sessions[currentSession].guests.push({ id, name, total: count, assigned: 0, note });
    colorMap[id] = colors[sessions[currentSession].guests.length % colors.length];
    document.getElementById('inName').value = ""; document.getElementById('inCount').value = ""; document.getElementById('inNote').value = "";
    saveData(); render();
}

function deleteGuest(e, id) {
    e.stopPropagation();
    if (!confirm("確定刪除？")) return;
    const session = sessions[currentSession];
    session.guests = session.guests.filter(g => g.id !== id);
    for (let key in session.seatMap) if (session.seatMap[key] === id) delete session.seatMap[key];
    saveData(); render();
}

function handleSeatClick(seatId) {
    const session = sessions[currentSession];
    const gid = session.seatMap[seatId];
    if (gid) {
        const g = session.guests.find(x => x.id === gid);
        if (g) g.assigned--;
        delete session.seatMap[seatId];
    } else if (selectedGuestId) {
        const g = session.guests.find(x => x.id === selectedGuestId);
        if (g && g.assigned < g.total) {
            session.seatMap[seatId] = selectedGuestId;
            g.assigned++;
        }
    }
    saveData(); render();
}

function render() {
    renderGuestList();
    renderSeats();
    syncLayout();
}

function renderGuestList() {
    const list = document.getElementById('guest-list'); list.innerHTML = "";
    sessions[currentSession].guests.forEach(g => {
        const item = document.createElement('div');
        item.className = `guest-item ${g.assigned >= g.total ? 'completed' : ''} ${selectedGuestId === g.id ? 'selected' : ''}`;
        item.innerHTML = `
            <div class="guest-info">
                <span class="guest-name">${g.name} (${g.assigned}/${g.total})</span>
                ${g.note ? `<span class="guest-note">註: ${g.note}</span>` : ''}
            </div>
            <div class="btn-delete" onclick="deleteGuest(event, '${g.id}')">✕</div>
        `;
        if (g.assigned < g.total) item.onclick = () => { selectedGuestId = g.id; render(); };
        list.appendChild(item);
    });
}

function renderSeats() {
    const root = document.getElementById("floor1-rows"); root.innerHTML = "";
    floor1Rows.forEach(conf => {
        const row = document.createElement("div"); row.className = "row";
        row.innerHTML = `<div class="label">${conf.row}</div>`;
        const seatRow = document.createElement("div"); seatRow.className = "seat-row";
        
        // 簡易渲染左右區 (奇數左，偶數右)
        const left = document.createElement("div"); left.className = "cluster";
        const right = document.createElement("div"); right.className = "cluster";
        
        for(let i=conf.total; i>=1; i--) {
            if(i%2!==0) left.appendChild(createSeat(conf.row, i));
        }
        for(let i=2; i<=conf.total; i+=2) {
            right.appendChild(createSeat(conf.row, i));
        }
        
        seatRow.appendChild(left); seatRow.appendChild(createGap()); seatRow.appendChild(right);
        row.appendChild(seatRow); root.appendChild(row);
    });
}

function createSeat(row, num) {
    const sid = `${row}-${num}`;
    const gid = sessions[currentSession].seatMap[sid];
    const guest = gid ? sessions[currentSession].guests.find(x => x.id === gid) : null;
    const el = document.createElement("div");
    el.className = `seat ${guest ? 'occupied has-border' : ''}`;
    if (guest) {
        el.style.borderColor = colorMap[gid];
        el.textContent = guest.name; // 座位上不顯示備註
    } else {
        el.textContent = num;
    }
    el.onclick = () => handleSeatClick(sid);
    return el;
}

function createGap() { const g = document.createElement("div"); g.className = "gap"; return g; }
function syncLayout() { /* 處理字幕區與包廂對齊邏輯... */ }

window.onload = loadData;
</script>
</body>
</html>
